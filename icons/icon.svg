  <circle cx="310" cy="282" r="27" fill="#e8a33d"/>
  <circle cx="202" cy="284" r="13" fill="#2a2a28"/>
  <circle cx="310" cy="284" r="13" fill="#2a2a28"/>
  <circle cx="207" cy="278" r="4.5" fill="#ffffff"/>
  <circle cx="315" cy="278" r="4.5" fill="#ffffff"/>

